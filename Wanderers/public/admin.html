<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Wanderers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
    </style>
</head>
<body class="antialiased">
    <!-- Navbar -->
    <nav class="bg-gray-900 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex-shrink-0 flex items-center">
                    <span class="text-xl font-bold tracking-wider text-blue-400">WANDERERS ADMIN</span>
                </div>
                <div>
                    <a href="index.html" class="text-gray-300 hover:text-white px-3 py-2 rounded-md font-medium transition">Back to Site</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-10">
        <div class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Dashboard</h1>
                <p class="text-gray-500 mt-1">Manage bookings and packages overview.</p>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <p class="text-sm font-medium text-gray-500 mb-1">Total Bookings</p>
                <p class="text-3xl font-bold text-gray-900" id="stat-total">-</p>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <p class="text-sm font-medium text-gray-500 mb-1">Pending Status</p>
                <p class="text-3xl font-bold text-yellow-600" id="stat-pending">-</p>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <p class="text-sm font-medium text-gray-500 mb-1">Revenue Estimate</p>
                <p class="text-3xl font-bold text-green-600" id="stat-revenue">-</p>
            </div>
        </div>

        <!-- Bookings Table -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="px-6 py-5 border-b border-gray-100 bg-gray-50">
                <h3 class="text-lg leading-6 font-medium text-gray-900">Recent Bookings</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">User</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Package</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Travel Date</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Pax</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                        </tr>
                    </thead>
                    <tbody id="bookings-tbody" class="bg-white divide-y divide-gray-200">
                        <tr><td colspan="6" class="px-6 py-4 text-center text-gray-500">Loading bookings...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('/api/admin/bookings')
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById('bookings-tbody');
                    tbody.innerHTML = '';
                    
                    if(data.data && data.data.length > 0) {
                        let total = 0, pending = 0, revenue = 0;

                        data.data.forEach(b => {
                            total++;
                            if(b.status === 'Pending') pending++;
                            revenue += (b.package_price * b.passengers);

                            const row = document.createElement('tr');
                            row.className = "hover:bg-gray-50";
                            row.innerHTML = `
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">#${b.id}</td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="text-sm font-medium text-gray-900">${b.user_name}</div>
                                    <div class="text-sm text-gray-500">${b.user_email}</div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="text-sm text-gray-900">${b.package_title}</div>
                                    <div class="text-sm text-gray-500">$${b.package_price} / pax</div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${b.travel_date}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${b.passengers}</td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-yellow-100 text-yellow-800">
                                        ${b.status}
                                    </span>
                                </td>
                            `;
                            tbody.appendChild(row);
                        });

                        document.getElementById('stat-total').innerText = total;
                        document.getElementById('stat-pending').innerText = pending;
                        document.getElementById('stat-revenue').innerText = '$' + revenue.toLocaleString();
                    } else {
                        tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-8 text-center text-gray-500">No bookings found.</td></tr>';
                    }
                })
                .catch(err => console.error(err));
        });
    </script>
</body>
</html>
